# Local services for testing without a manually managed DATABASE_URL.
# API env: DATABASE_URL=postgresql+asyncpg://leetcode:leetcode@127.0.0.1:55432/leetcode
# API env: REDIS_URL=redis://127.0.0.1:6379/0
services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: leetcode
      POSTGRES_PASSWORD: leetcode
      POSTGRES_DB: leetcode
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetcode -d leetcode"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15
